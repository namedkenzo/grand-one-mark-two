<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grade One Mark Two | پنل مدیریت رله</title>
  <style>
    /* Inline minimal styles for immediate rendering */
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 2rem;
      background: #f5f5f5;
      color: #333;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 2rem;
    }
    h1 {
      font-size: 1.8rem;
      margin-top: 0;
    }
    .status {
      margin: 1.5rem 0;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
      padding: 0.75rem 0;
    }
    .status-label {
      font-weight: bold;
    }
    button {
      background: #0070f3;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover {
      background: #0051a8;
    }
    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.9rem;
      color: #666;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Grade One Mark Two</h1>
    <p>سرویس رله هوشمند با Edge Function</p>

    <section class="status">
      <div class="status-item">
        <span class="status-label">آدرس Upstream</span>
        <span id="upstream" aria-live="polite">---</span>
      </div>
      <div class="status-item">
        <span class="status-label">آخرین بررسی</span>
        <span id="lastCheck" aria-live="polite">---</span>
      </div>
    </section>

    <button id="refreshBtn">بروزرسانی وضعیت</button>

    <footer>
      <p>Grade One Mark Two • تمام حقوق محفوظ است</p>
    </footer>
  </main>

  <script>
    (function() {
      'use strict';

      // DOM references
      const upstreamEl = document.getElementById('upstream');
      const lastCheckEl = document.getElementById('lastCheck');
      const refreshBtn = document.getElementById('refreshBtn');

      /**
       * Format a timestamp into a localized Persian string.
       * @param {number} ts - Unix timestamp in milliseconds
       * @returns {string} Formatted date/time
       */
      function formatTime(ts) {
        return new Date(ts).toLocaleString('fa-IR', {
          dateStyle: 'medium',
          timeStyle: 'medium',
        });
      }

      /**
       * Fetch status from the /status endpoint and update the UI.
       */
      async function fetchStatus() {
        try {
          const response = await fetch('/status');
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();

          upstreamEl.textContent = data.upstream || '---';
          lastCheckEl.textContent = data.timestamp
            ? formatTime(data.timestamp)
            : '---';
        } catch (error) {
          console.error('Status fetch failed:', error);
          upstreamEl.textContent = 'خطا';
          lastCheckEl.textContent = '---';
        }
      }

      // Initial fetch and event binding
      fetchStatus();
      refreshBtn.addEventListener('click', fetchStatus);
    })();
  </script>
</body>
</html>
